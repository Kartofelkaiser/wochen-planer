<!-- Wochenküche – ganztägiger Ernährungsplan (~2100 kcal), Koch-Modus, Einkaufsliste, Chat, Nährstoffe -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wochenküche</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FBFAF7; --card:#FFFFFF; --ink:#1F2421; --muted:#6B716C; --line:#E7E5DE;
    --green:#2E6B43; --green-d:#1F4E30; --green-soft:#E8F0E9;
    --amber:#C97E22; --amber-soft:#FAEFDC;
    --tomato:#D2502F; --yolk:#F2B441; --veg:#6FA84B; --potato:#E3C27A;
    --brown:#8A5A3B; --rice:#F3EEDF; --soup:#E0913A; --berry:#B5446E;
    --radius:12px;
    --display:'Bricolage Grotesque', system-ui, sans-serif;
    --body:'Inter', system-ui, -apple-system, sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--bg); color:var(--ink); font-family:var(--body); line-height:1.55; -webkit-font-smoothing:antialiased;}
  .wrap{max-width:980px; margin:0 auto; padding:0 18px 64px;}
  header.top{position:sticky; top:0; z-index:20; background:rgba(251,250,247,0.92); backdrop-filter:blur(8px); border-bottom:1px solid var(--line);}
  .top-inner{max-width:980px; margin:0 auto; padding:14px 18px 0;}
  .brand{display:flex; align-items:center; gap:10px;}
  .brand .mark{width:30px; height:30px; flex:none;}
  .brand h1{font-family:var(--display); font-weight:700; font-size:22px; margin:0; letter-spacing:-0.01em;}
  .brand p{margin:0; font-size:13px; color:var(--muted);}
  nav{display:flex; gap:2px; margin-top:12px; overflow-x:auto; scrollbar-width:none;}
  nav::-webkit-scrollbar{display:none}
  nav button{font-family:var(--body); font-size:14px; font-weight:500; color:var(--muted); background:none; border:none; border-bottom:2px solid transparent; padding:8px 11px 12px; cursor:pointer; white-space:nowrap;}
  nav button:hover{color:var(--ink)}
  nav button[aria-selected="true"]{color:var(--green-d); border-bottom-color:var(--green);}
  nav button i{font-style:normal; margin-right:6px;}
  .view{padding-top:24px; animation:fade .25s ease;}
  @keyframes fade{from{opacity:0; transform:translateY(4px)} to{opacity:1; transform:none}}
  @media (prefers-reduced-motion:reduce){.view{animation:none}}
  .eyebrow{font-size:12px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--amber); margin:0 0 4px;}
  h2.section{font-family:var(--display); font-weight:600; font-size:26px; margin:0 0 4px; letter-spacing:-0.01em;}
  .lead{color:var(--muted); margin:0 0 18px; max-width:64ch;}
  .infobar{background:var(--amber-soft); color:#7a4d10; border-radius:10px; padding:10px 14px; font-size:13px; margin-bottom:20px; display:flex; gap:9px; align-items:flex-start;}
  .infobar i{font-style:normal}
  .grid{display:grid; gap:14px;}
  .grid.days{grid-template-columns:repeat(auto-fill, minmax(220px,1fr));}
  .card{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden;}
  .thumb{position:relative; aspect-ratio:16/10; background:var(--green-soft); display:flex; align-items:center; justify-content:center;}
  .thumb .ill{position:absolute; inset:0; display:flex; align-items:center; justify-content:center;}
  .thumb .ill svg{width:74%; height:74%;}
  .thumb img{position:absolute; inset:0; width:100%; height:100%; object-fit:cover;}
  .card .body{padding:12px 14px 14px;}
  .daytag{font-size:12px; font-weight:600; color:var(--amber); letter-spacing:.04em; text-transform:uppercase;}
  .dish{font-family:var(--display); font-weight:600; font-size:17px; margin:2px 0 8px; line-height:1.25;}
  .meallines{font-size:12.5px; color:var(--muted); margin:8px 0 12px; line-height:1.7;}
  .meallines b{color:var(--ink); font-weight:500;}
  .meta{display:flex; gap:10px; flex-wrap:wrap; font-size:12.5px; color:var(--muted); margin-bottom:10px;}
  .pill{display:inline-block; font-size:11.5px; font-weight:500; color:var(--green-d); background:var(--green-soft); border-radius:999px; padding:2px 9px; margin:0 4px 4px 0;}
  .pill.amber{color:#7a4d10; background:var(--amber-soft);}
  .btn{font-family:var(--body); font-size:14px; font-weight:500; cursor:pointer; border-radius:8px; padding:9px 14px; border:1px solid var(--line); background:var(--card); color:var(--ink); transition:background .15s, border-color .15s;}
  .btn:hover{background:#FAF8F2; border-color:#d8d6cd;}
  .btn.primary{background:var(--green); border-color:var(--green); color:#fff;}
  .btn.primary:hover{background:var(--green-d); border-color:var(--green-d);}
  .btn.full{width:100%}
  .btn:disabled{opacity:.55; cursor:default}
  .btn:focus-visible, nav button:focus-visible, .opt:focus-visible{outline:2px solid var(--green); outline-offset:2px;}
  .generate{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:16px 18px; margin-bottom:24px; display:flex; gap:16px; align-items:center; flex-wrap:wrap;}
  .generate .gtxt{flex:1; min-width:200px}
  .generate h3{font-family:var(--display); font-weight:600; font-size:16px; margin:0 0 3px;}
  .generate p{margin:0; font-size:13px; color:var(--muted);}
  .blocklbl{font-family:var(--display); font-weight:600; font-size:18px; margin:26px 0 12px; padding-bottom:6px; border-bottom:1px solid var(--line);}
  .daygroup{margin-bottom:20px;}
  .daygroup h3{font-family:var(--display); font-weight:600; font-size:15px; margin:0 0 10px; display:flex; align-items:center; gap:8px;}
  .daygroup h3 .num{width:22px; height:22px; flex:none; border-radius:6px; background:var(--green-soft); color:var(--green-d); font-size:12px; font-weight:700; display:flex; align-items:center; justify-content:center; font-family:var(--body);}
  .opts{display:grid; gap:12px; grid-template-columns:repeat(auto-fill,minmax(190px,1fr));}
  .opt{text-align:left; cursor:pointer; background:var(--card); border:1.5px solid var(--line); border-radius:var(--radius); padding:0; overflow:hidden; display:flex; flex-direction:column; transition:border-color .15s, box-shadow .15s;}
  .opt:hover{border-color:#cfcdc4;}
  .opt[aria-pressed="true"]{border-color:var(--green); box-shadow:0 0 0 3px var(--green-soft);}
  .opt .ph{position:relative; aspect-ratio:16/9; background:var(--green-soft); display:flex; align-items:center; justify-content:center;}
  .opt .ph .ill{position:absolute; inset:0; display:flex; align-items:center; justify-content:center;}
  .opt .ph .ill svg{width:66%; height:66%;}
  .opt .ph img{position:absolute; inset:0; width:100%; height:100%; object-fit:cover;}
  .opt .check{position:absolute; top:8px; right:8px; width:22px; height:22px; border-radius:50%; background:#fff; border:1.5px solid var(--line); display:flex; align-items:center; justify-content:center; color:var(--green); font-size:14px; opacity:0; z-index:2;}
  .opt[aria-pressed="true"] .check{opacity:1; border-color:var(--green); background:var(--green); color:#fff;}
  .opt .oc{padding:10px 12px 12px;}
  .opt .on{font-family:var(--display); font-weight:600; font-size:14.5px; line-height:1.2;}
  .opt .od{font-size:12px; color:var(--muted); margin-top:3px;}
  .savebar{position:sticky; bottom:0; background:rgba(251,250,247,0.95); backdrop-filter:blur(8px); border-top:1px solid var(--line); padding:14px 0; display:flex; gap:12px; align-items:center; justify-content:space-between; flex-wrap:wrap; margin-top:8px;}
  .savebar .note{font-size:13px; color:var(--muted);}
  .cooklayout{display:grid; grid-template-columns:240px 1fr; gap:20px; align-items:start;}
  @media(max-width:720px){.cooklayout{grid-template-columns:1fr}}
  .cooknav{display:flex; flex-direction:column; gap:5px;}
  .cooknav button{text-align:left; font-family:var(--body); font-size:13.5px; padding:8px 10px; border-radius:8px; border:1px solid transparent; background:none; cursor:pointer; color:var(--ink); display:flex; align-items:center; gap:9px;}
  .cooknav button:hover{background:var(--card); border-color:var(--line);}
  .cooknav button[aria-current="true"]{background:var(--green-soft); color:var(--green-d); font-weight:500;}
  .cooknav .mini{position:relative; width:28px; height:28px; flex:none; border-radius:6px; background:var(--green-soft); display:flex; align-items:center; justify-content:center; overflow:hidden;}
  .cooknav .mini svg{width:20px; height:20px;}
  .cooknav .mini img{position:absolute; inset:0; width:100%; height:100%; object-fit:cover;}
  .cooknav .grouplbl{font-size:11px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); margin:12px 0 2px; padding:0 4px;}
  .recipe .rhead{display:flex; gap:16px; align-items:center; margin-bottom:16px;}
  .recipe .rhead .ill{position:relative; width:104px; height:104px; flex:none; border-radius:14px; background:var(--green-soft); display:flex; align-items:center; justify-content:center; overflow:hidden;}
  .recipe .rhead .ill .illsvg{position:absolute; inset:0; display:flex; align-items:center; justify-content:center;}
  .recipe .rhead .ill .illsvg svg{width:72%; height:72%;}
  .recipe .rhead .ill img{position:absolute; inset:0; width:100%; height:100%; object-fit:cover;}
  .recipe h3{font-family:var(--display); font-weight:700; font-size:22px; margin:0 0 4px; line-height:1.1;}
  .recipe .rmeta{font-size:13px; color:var(--muted);}
  .recipe .panel{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:16px 18px; margin-bottom:16px;}
  .recipe h4{font-family:var(--display); font-weight:600; font-size:15px; margin:0 0 10px; color:var(--green-d);}
  ul.ing{list-style:none; margin:0; padding:0;}
  ul.ing li{display:flex; align-items:flex-start; gap:10px; padding:6px 0; border-bottom:1px solid var(--line); font-size:14.5px;}
  ul.ing li:last-child{border-bottom:none}
  ul.ing input{margin-top:3px}
  ul.ing .q{margin-left:auto; color:var(--muted); font-variant-numeric:tabular-nums; white-space:nowrap; padding-left:10px;}
  ol.steps{list-style:none; counter-reset:s; margin:0; padding:0;}
  ol.steps li{counter-increment:s; display:flex; gap:12px; padding:10px 0; align-items:flex-start;}
  ol.steps li::before{content:counter(s); flex:none; width:26px; height:26px; border-radius:50%; background:var(--green); color:#fff; font-weight:600; font-size:13px; display:flex; align-items:center; justify-content:center; font-family:var(--body); margin-top:1px;}
  ol.steps li.done{opacity:.45}
  ol.steps li.done::before{background:var(--muted)}
  ol.steps li span{cursor:pointer; font-size:14.5px;}
  .tip{background:var(--amber-soft); border-radius:10px; padding:11px 14px; font-size:13.5px; color:#7a4d10; display:flex; gap:9px; align-items:flex-start; margin-bottom:14px;}
  .tip i{font-style:normal}
  .shopgroup{margin-bottom:20px;}
  .shopgroup h4{font-family:var(--display); font-weight:600; font-size:15px; color:var(--green-d); margin:0 0 8px;}
  ul.shop{list-style:none; margin:0; padding:0; background:var(--card); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden;}
  ul.shop li{display:flex; align-items:center; gap:12px; padding:11px 15px; border-bottom:1px solid var(--line); font-size:14.5px;}
  ul.shop li:last-child{border-bottom:none}
  ul.shop li.checked label{text-decoration:line-through; color:var(--muted);}
  ul.shop li label{flex:1; cursor:pointer;}
  ul.shop li .amt{color:var(--muted); font-variant-numeric:tabular-nums;}
  ul.shop li input{width:18px; height:18px; accent-color:var(--green);}
  .nutbars{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:18px 20px; margin-bottom:18px;}
  .nutrow{margin-bottom:15px;}
  .nutrow:last-child{margin-bottom:0}
  .nutrow .top{display:flex; justify-content:space-between; align-items:baseline; font-size:14px; margin-bottom:6px;}
  .nutrow .nm{font-weight:500;}
  .nutrow .vl{color:var(--muted); font-variant-numeric:tabular-nums; font-size:13px;}
  .bar{height:9px; background:var(--green-soft); border-radius:999px; overflow:hidden;}
  .bar span{display:block; height:100%; background:var(--green); border-radius:999px; transition:width .6s ease;}
  .bar span.full{background:var(--amber)}
  .callout{background:var(--green-soft); border-radius:var(--radius); padding:15px 18px; font-size:14px; color:var(--green-d); margin-top:6px;}
  .chatwrap{display:flex; flex-direction:column; height:min(60vh,520px); background:var(--card); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden;}
  .chatlog{flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:12px;}
  .msg{max-width:80%; padding:10px 14px; border-radius:14px; font-size:14.5px; line-height:1.5; white-space:pre-wrap; word-wrap:break-word;}
  .msg.user{align-self:flex-end; background:var(--green); color:#fff; border-bottom-right-radius:4px;}
  .msg.bot{align-self:flex-start; background:#F3F1EA; color:var(--ink); border-bottom-left-radius:4px;}
  .msg.bot.think{color:var(--muted); font-style:italic;}
  .chatin{display:flex; gap:8px; padding:12px; border-top:1px solid var(--line);}
  .chatin input{flex:1; font-family:var(--body); font-size:14.5px; padding:10px 14px; border:1px solid var(--line); border-radius:999px; outline:none; background:var(--bg);}
  .chatin input:focus{border-color:var(--green);}
  .chips{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px;}
  .chip{font-size:13px; color:var(--green-d); background:var(--green-soft); border:none; border-radius:999px; padding:7px 13px; cursor:pointer;}
  .chip:hover{background:#dceadf;}
  .dots span{display:inline-block; width:6px; height:6px; margin:0 1px; background:var(--muted); border-radius:50%; animation:bl 1s infinite;}
  .dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
  @keyframes bl{0%,60%,100%{opacity:.3}30%{opacity:1}}
  .empty{text-align:center; padding:50px 20px; color:var(--muted);}
  .spin{width:18px;height:18px;border:2px solid rgba(255,255,255,.5);border-top-color:#fff;border-radius:50%;display:inline-block;vertical-align:-3px;margin-right:8px;animation:sp .7s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .toast{position:fixed; left:50%; bottom:22px; transform:translateX(-50%) translateY(20px); background:var(--ink); color:#fff; padding:11px 18px; border-radius:999px; font-size:14px; opacity:0; pointer-events:none; transition:.3s; z-index:50; max-width:90%;}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
</style>
<header class="top"><div class="top-inner">
  <div class="brand">
    <svg class="mark" viewBox="0 0 40 40" aria-hidden="true"><circle cx="20" cy="20" r="19" fill="#2E6B43"/><path d="M14 11v8c0 2 1.4 3.4 3 3.8V29a1 1 0 0 0 2 0v-6.2c1.6-.4 3-1.8 3-3.8v-8a1 1 0 0 0-2 0v6a1 1 0 0 1-2 0v-6a1 1 0 0 0-2 0v6a1 1 0 0 1-2 0v-6a1 1 0 0 0-2 0Z" fill="#fff"/><path d="M26 11c-1.6 0-2.8 2.4-2.8 5.4 0 2.3 1 3.4 2 3.8V29a1 1 0 0 0 1.6.8" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/></svg>
    <div><h1>Wochenküche</h1><p>Ganzer Tag geplant · ~2100 kcal · Rezepte · Einkaufsliste — für 1 Person</p></div>
  </div>
  <nav id="nav" role="tablist">
    <button role="tab" data-view="plan" aria-selected="true"><i>🗓️</i>Plan</button>
    <button role="tab" data-view="cook" aria-selected="false"><i>👩‍🍳</i>Kochen</button>
    <button role="tab" data-view="create" aria-selected="false"><i>✏️</i>Plan bearbeiten</button>
    <button role="tab" data-view="shop" aria-selected="false"><i>🛒</i>Einkaufsliste</button>
    <button role="tab" data-view="nutri" aria-selected="false"><i>🥗</i>Nährstoffe</button>
    <button role="tab" data-view="chat" aria-selected="false"><i>💬</i>Fragen</button>
  </nav>
</div></header>
<div class="wrap"><main id="app"></main></div>
<div class="toast" id="toast"></div>
<script>
const WM=(f)=>'https://commons.wikimedia.org/wiki/Special:FilePath/'+encodeURIComponent(f)+'?width=500';
const MDB=(f)=>'https://www.themealdb.com/images/media/meals/'+f;
function illo(kind){
  const c={tomato:'#D2502F',yolk:'#F2B441',veg:'#6FA84B',potato:'#E3C27A',brown:'#8A5A3B',rice:'#F3EEDF',soup:'#E0913A',green:'#2E6B43',cream:'#FBF6EA',plate:'#FFFFFF',berry:'#B5446E'};
  const bowl=(f)=>'<path d="M10 50 Q50 78 90 50 L86 56 Q50 80 14 56 Z" fill="#E7E5DE"/><path d="M14 49 Q50 72 86 49 Q82 67 50 70 Q18 67 14 49Z" fill="'+f+'"/>';
  const S=(i)=>'<svg viewBox="0 0 100 90" xmlns="http://www.w3.org/2000/svg" role="img" aria-hidden="true">'+i+'</svg>';
  switch(kind){
    case 'pasta': return S(bowl(c.cream)+'<path d="M22 50 Q35 40 50 50 T78 50" stroke="#EAD9A0" stroke-width="3" fill="none" stroke-linecap="round"/><path d="M26 56 Q40 46 54 56 T80 54" stroke="#E7D497" stroke-width="3" fill="none" stroke-linecap="round"/><ellipse cx="50" cy="52" rx="13" ry="7" fill="'+c.tomato+'"/><circle cx="44" cy="50" r="2" fill="'+c.veg+'"/>');
    case 'sheet': return S('<rect x="12" y="30" width="76" height="40" rx="7" fill="#D8D5CC"/><rect x="16" y="34" width="68" height="32" rx="4" fill="#EFE9DC"/><circle cx="30" cy="46" r="6" fill="'+c.tomato+'"/><rect x="42" y="40" width="11" height="11" rx="2.5" fill="'+c.potato+'"/><circle cx="64" cy="45" r="6" fill="'+c.veg+'"/><rect x="56" y="54" width="11" height="9" rx="2.5" fill="'+c.potato+'"/><circle cx="38" cy="58" r="5" fill="'+c.green+'"/><circle cx="72" cy="58" r="5" fill="'+c.tomato+'"/>');
    case 'sheetC': return S('<rect x="12" y="30" width="76" height="40" rx="7" fill="#D8D5CC"/><rect x="16" y="34" width="68" height="32" rx="4" fill="#EFE9DC"/><ellipse cx="40" cy="50" rx="15" ry="11" fill="#C98A3E"/><ellipse cx="40" cy="48" rx="11" ry="7" fill="#D99B4E"/><rect x="60" y="40" width="10" height="10" rx="2.5" fill="'+c.potato+'"/><circle cx="70" cy="58" r="5" fill="'+c.veg+'"/>');
    case 'rice': return S(bowl(c.rice)+'<ellipse cx="50" cy="51" rx="15" ry="8" fill="'+c.veg+'"/><circle cx="44" cy="49" r="3" fill="#fff" opacity=".7"/><circle cx="58" cy="48" r="3" fill="'+c.tomato+'"/>');
    case 'curry': return S(bowl(c.rice)+'<ellipse cx="50" cy="51" rx="15" ry="8" fill="'+c.soup+'"/><circle cx="44" cy="50" r="3.2" fill="#E8C27A"/><circle cx="53" cy="53" r="3.2" fill="#E8C27A"/><circle cx="48" cy="48" r="1.8" fill="'+c.green+'"/>');
    case 'potato': return S('<ellipse cx="50" cy="50" rx="30" ry="19" fill="'+c.potato+'"/><ellipse cx="50" cy="48" rx="26" ry="15" fill="#EAD09A"/><ellipse cx="50" cy="46" rx="14" ry="6" fill="#F4F1E6"/><circle cx="46" cy="46" r="1.6" fill="'+c.veg+'"/><circle cx="54" cy="45" r="1.6" fill="'+c.veg+'"/>');
    case 'eggs': return S('<circle cx="50" cy="50" r="34" fill="#CFCCC3"/><circle cx="50" cy="50" r="29" fill="#3A3A38"/><ellipse cx="42" cy="48" rx="13" ry="10" fill="#FBF6EA"/><circle cx="42" cy="48" r="5" fill="'+c.yolk+'"/><ellipse cx="60" cy="56" rx="11" ry="8" fill="#FBF6EA"/><circle cx="60" cy="56" r="4.2" fill="'+c.yolk+'"/><rect x="78" y="44" width="16" height="6" rx="3" fill="'+c.brown+'"/>');
    case 'shak': return S('<circle cx="50" cy="50" r="34" fill="#CFCCC3"/><circle cx="50" cy="50" r="29" fill="'+c.tomato+'"/><circle cx="43" cy="47" r="7.5" fill="#FBF6EA"/><circle cx="43" cy="47" r="3.6" fill="'+c.yolk+'"/><circle cx="59" cy="55" r="7.5" fill="#FBF6EA"/><circle cx="59" cy="55" r="3.6" fill="'+c.yolk+'"/>');
    case 'meat': return S(bowl(c.plate)+'<ellipse cx="40" cy="51" rx="9" ry="6" fill="'+c.brown+'"/><ellipse cx="58" cy="53" rx="9" ry="6" fill="#7A4E33"/><ellipse cx="49" cy="47" rx="7" ry="4.5" fill="#8A5A3B"/><circle cx="68" cy="50" r="4" fill="'+c.veg+'"/>');
    case 'soup': return S(bowl(c.soup)+'<ellipse cx="50" cy="50" rx="16" ry="8.5" fill="#E89E48"/><circle cx="44" cy="50" r="2.6" fill="'+c.tomato+'"/><circle cx="55" cy="52" r="2.6" fill="'+c.potato+'"/><path d="M44 30 q3 4 0 8 M52 28 q3 4 0 8" stroke="#D8D5CC" stroke-width="2" fill="none" stroke-linecap="round"/>');

async function store(k,v){
  const s=JSON.stringify(v);

  try{
    const r=await fetch('/api/store?key='+encodeURIComponent(k),{method:'PUT',headers:{'Content-Type':'application/json'},body:s});
    if(r.ok) return 'remote';
  }catch(e){}
  mem[k]=v; return 'local';
}
async function load(k,fb){

    if(r.ok){ const j=await r.json(); if(j!=null) return j; }
  }catch(e){}
  try{ const r=localStorage.getItem('wk_'+k); if(r!=null) return JSON.parse(r); }catch(e){}
  return (k in mem)?mem[k]:fb;
}

async function askClaude(messages, system, maxTokens){
  const res=await fetch('/api/claude',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:messages,system:system,max_tokens:maxTokens||1500})});
  const data=await res.json();
  if(data.error) throw new Error(typeof data.error==='string'?data.error:JSON.stringify(data.error));

}

      const amt=e.hasNum?(Math.round(e.qty*10)/10+(e.unit?(' '+e.unit):'')):(e.count>1?'×'+e.count:'');
      const ck=shopChecked[key]?'checked':'';
      return '<li class="'+(ck?'checked':'')+'" data-k="'+esc(key)+'"><input type="checkbox" '+ck+'><label>'+esc(e.item)+'</label><span class="amt">'+esc(amt)+'</span></li>';}).join('');
    html+='<div class="shopgroup"><h4>'+labels[cat]+'</h4><ul class="shop">'+lis+'</ul></div>'; });
  const stap=staples.length?'<div class="callout"><strong>Vorrat checken</strong> – meist im Haus: '+staples.map(esc).join(', ')+'.</div>':'';
  app.innerHTML='<section class="view"><p class="eyebrow">Für die Woche</p><h2 class="section">Einkaufsliste</h2><p class="lead">Aus dem ganzen Tagesplan – Frühstück und Mittag je 7×, plus die Abendessen. Häkchen bleiben gespeichert.</p>'+(html||'<div class="empty">🛒 Noch nichts geplant.</div>')+stap+'</section>';
  app.querySelectorAll('ul.shop li').forEach(li=>{const cb=li.querySelector('input'); cb.onchange=async()=>{li.classList.toggle('checked',cb.checked); shopChecked[li.dataset.k]=cb.checked; await store('shop_v4',shopChecked);};});
}
function targetFor(k){ if(k==='kcal') return 2100; if(k==='protein') return Math.round(weight*1.5); return RI[k][1]; }
function renderNutri(){
  const dinAvg={kcal:0,protein:0,fiber:0,iron:0,calcium:0,vitc:0};
  DAYS.forEach(day=>{const n=DISHES[plan.dinners[day]].nutri; for(const k in dinAvg) dinAvg[k]+=n[k]/7;});
  const b=DISHES[plan.breakfast].nutri, l=DISHES[plan.lunch].nutri;
  const day={}; for(const k in RI){ day[k]=dinAvg[k]+b[k]+l[k]; }
  const bars=Object.keys(RI).map(k=>{ const label=RI[k][0],unit=RI[k][2],ri=targetFor(k); const pct=Math.round(day[k]/ri*100); const w=Math.min(100,pct); const cls=pct>=95?'full':'';
    return '<div class="nutrow"><div class="top"><span class="nm">'+label+'</span><span class="vl">'+Math.round(day[k])+' / '+ri+' '+unit+' · '+pct+'%</span></div><div class="bar"><span class="'+cls+'" style="width:'+w+'%"></span></div></div>';}).join('');
  app.innerHTML='<section class="view"><p class="eyebrow">Ganzer Tag</p><h2 class="section">Nährstoff-Deckung</h2><p class="lead">Ziel: rund 2100 kcal und '+Math.round(weight*1.5)+' g Eiweiß (1,5 g/kg) pro Tag, dazu Ballaststoffe, Eisen, Calcium und Vitamin C. Angezeigt wird der Ø pro Tag über Frühstück, Mittag und Abendessen.</p>'
    +'<div class="generate"><div class="gtxt"><h3>Dein Gewicht</h3><p>Passt das Eiweißziel automatisch an.</p></div><div style="display:flex;align-items:center;gap:8px"><input id="wIn" type="number" min="40" max="160" value="'+weight+'" style="width:84px;font-family:var(--body);font-size:15px;padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:var(--bg)"> kg</div></div>'
    +'<div class="nutbars">'+bars+'</div><div class="callout">Mit deinem aktuellen Plan liegst du bei rund '+Math.round(day.kcal)+' kcal und '+Math.round(day.protein)+' g Eiweiß pro Tag. Ist die Calcium-Leiste mal niedrig, hilft ein Frühstück mit Skyr/Quark oder ein Glas Milch extra. Grobe Schätzwerte, keine individuelle Ernährungsberatung.</div></section>';
  const wi=app.querySelector('#wIn'); if(wi) wi.onchange=async()=>{ let v=parseInt(wi.value,10); if(!v||v<40)v=40; if(v>160)v=160; weight=v; await store('weight_v4',weight); renderNutri(); };
}
function planSummary(){ return 'Frühstück: '+DISHES[plan.breakfast].name+'; Mittag: '+DISHES[plan.lunch].name+'; Abendessen – '+DAYS.map(d=>d+': '+DISHES[plan.dinners[d]].name).join(', '); }
function renderChat(){
  const chips=['Wie peppe ich mein Abendessen auf?','Ersatz für Feta?','Mach Mittwoch vegetarisch','Wie friere ich Reste ein?'];
  const log=chatHistory.map(m=>'<div class="msg '+(m.role==='user'?'user':'bot')+'">'+esc(m.content)+'</div>').join('');
  app.innerHTML='<section class="view"><p class="eyebrow">Sprich mit mir</p><h2 class="section">Fragen &amp; Rückfragen</h2><p class="lead">Frag Claude alles zu deinem Plan, zu Rezepten, Ersatzzutaten oder Resten – er kennt deinen aktuellen Tagesplan.</p><div class="chips">'+chips.map(c=>'<button class="chip">'+esc(c)+'</button>').join('')+'</div><div class="chatwrap"><div class="chatlog" id="chatlog">'+(log||'<div class="msg bot">Hi! Was möchtest du zu deiner Woche wissen?</div>')+'</div><div class="chatin"><input id="chatInput" placeholder="Frage eingeben…" autocomplete="off"><button class="btn primary" id="chatSend">Senden</button></div></div></section>';
  const input=app.querySelector('#chatInput'), logEl=app.querySelector('#chatlog');
  if(pendingChat){ input.value=pendingChat; pendingChat=''; input.focus(); }
  logEl.scrollTop=logEl.scrollHeight;
  app.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{input.value=c.textContent; input.focus();});
  async function send(){ const q=input.value.trim(); if(!q)return; input.value='';
    chatHistory.push({role:'user',content:q});
    logEl.insertAdjacentHTML('beforeend','<div class="msg user">'+esc(q)+'</div><div class="msg bot think" id="th"><span class="dots"><span></span><span></span><span></span></span></div>');
    logEl.scrollTop=logEl.scrollHeight;
    try{ const sys='Du bist der freundliche Koch-Assistent der App „Wochenküche" für EINE Person, die gesund, günstig und einfach kocht und alles isst (Ziel ~2100 kcal/Tag). Antworte knapp, praktisch, auf Deutsch. Aktueller Plan: '+planSummary()+'.';
      const ans=await askClaude(chatHistory.slice(-12).map(m=>({role:m.role,content:m.content})), sys);
      chatHistory.push({role:'assistant',content:ans}); await store('chat_v4',chatHistory.slice(-30));
      const t=document.getElementById('th'); if(t){t.classList.remove('think'); t.textContent=ans; t.id='';}
    }catch(e){ const t=document.getElementById('th'); if(t){t.classList.remove('think'); t.textContent='Da ging etwas schief – bitte nochmal versuchen.'; t.id='';} }
    logEl.scrollTop=logEl.scrollHeight;
  }
  app.querySelector('#chatSend').onclick=send;
  input.addEventListener('keydown',e=>{if(e.key==='Enter')send();});
}
const VIEWS={plan:renderPlan,cook:renderCook,create:renderCreate,shop:renderShop,nutri:renderNutri,chat:renderChat};
function switchView(v){ document.querySelectorAll('#nav button').forEach(b=>b.setAttribute('aria-selected',b.dataset.view===v)); if(v==='create') draft=JSON.parse(JSON.stringify(plan)); VIEWS[v](); window.scrollTo({top:0,behavior:'smooth'}); }
document.querySelectorAll('#nav button').forEach(b=>b.onclick=()=>switchView(b.dataset.view));
let toastT; function toast(m){const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2600);}
(async function init(){
  const custom=await load('custom_v4',{}); Object.assign(DISHES,custom);
  plan=await load('plan_v4',{dinners:Object.assign({},DEFAULT_DINNERS),breakfast:'b-quark',lunch:'l-bowl'});
  if(!plan||!plan.dinners) plan={dinners:Object.assign({},DEFAULT_DINNERS),breakfast:'b-quark',lunch:'l-bowl'};
  DAYS.forEach(d=>{ if(!DISHES[plan.dinners[d]]) plan.dinners[d]=DEFAULT_DINNERS[d]; });
  if(!DISHES[plan.breakfast]) plan.breakfast='b-quark';
  if(!DISHES[plan.lunch]) plan.lunch='l-bowl';
  shopChecked=await load('shop_v4',{});
  weight=await load('weight_v4',72);
  chatHistory=await load('chat_v4',[]);
  draft=JSON.parse(JSON.stringify(plan));
  renderPlan();
})();
</script>
